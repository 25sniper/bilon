{% comment %}Bulk Export Stores Modal{% endcomment %}
<div class="modal fade" id="exportStoresModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="fw-bold mb-0">Export Stores Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4 text-start">
        <p class="text-muted small">Here is a preview of the stores data ready for export:</p>
        
        <div id="storeExportPreview" class="bg-light p-3 rounded-3 mb-4" style="font-family: monospace; font-size: 0.8rem; max-height: 250px; overflow-y: auto; white-space: pre;">Loading preview...</div>
        
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-outline-secondary rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Close</button>
          <a href="#" id="downloadStoreExportBtn" class="btn text-white fw-bold rounded-pill px-4 shadow-sm" style="background-color: #ff6600;" download="stores_export.csv">
            <i class="bi bi-download me-1"></i> Download CSV
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
