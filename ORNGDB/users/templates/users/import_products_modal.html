{% comment %}Bulk Import Products Modal{% endcomment %}
<div class="modal fade" id="importProductsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="fw-bold mb-0">Import Products</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4 text-start">
        <p class="text-muted small">Upload a CSV file to import products in bulk. The columns should be formatted as follows:</p>
        
        <div class="bg-light p-3 rounded-3 mb-3" style="font-family: monospace; font-size: 0.8rem; overflow-x: auto; white-space: pre;">position,name,price,available,icon
1,Banana,60.00,True,🍌</div>
        
        <div class="d-flex justify-content-between align-items-center mb-4 bg-light p-2 rounded-3">
          <span class="small text-muted fw-bold ps-2">Download Template:</span>
          <a href="#" id="downloadProductSampleBtn" class="btn btn-sm text-white fw-bold rounded-pill px-3 shadow-sm" style="background-color: #ff6600;" download="products_sample.csv">
            <i class="bi bi-download me-1"></i> Sample CSV
          </a>
        </div>
        
        <form id="importProductsForm" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Select CSV File</label>
            <input type="file" id="productCsvFileInput" class="form-control rounded-3" accept=".csv" required />
          </div>
          <button type="submit" class="btn w-100 fw-bold text-white rounded-pill mt-2 shadow-sm" style="background-color: #ff6600;">
            Upload and Import
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
