{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        
        <!-- Header -->
        <div class="mb-4 mt-2">
            <a href="{% url 'delivery_dashboard' %}" class="btn btn-link text-decoration-none text-muted p-0 mb-3 d-inline-flex align-items-center" style="font-size: 0.95rem;">
                <i class="bi bi-arrow-left me-2"></i> Back to Dashboard
            </a>
            
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="fw-bold mb-1 text-dark" style="font-family: 'Outfit', sans-serif;">Order #{{ order.id }}</h4>
                    <p class="text-muted mb-0 small">{{ order.created_at|date:"M d, Y • h:i A" }}</p>
                </div>
                <span class="badge rounded-pill text-bg-warning px-3 py-2 text-dark border-0 shadow-sm" style="font-size: 0.8rem;">
                    <i class="bi bi-box me-1"></i> To Pack
                </span>
            </div>
            <div class="mt-3">
                <h5 class="fw-bold text-dark mb-0">{{ order.store_name }}</h5>
            </div>
        </div>

        <!-- Checklist Card -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4">
                <h6 class="text-muted mb-4 fw-bold" style="font-size: 0.9rem;">
                    <i class="bi bi-check2-square me-2"></i>Check off items to pack
                </h6>
                
                <ul class="list-unstyled mb-0">
                    {% for item in order.items.all %}
                    <li class="mb-3 pb-3 border-bottom border-light last-border-0">
                        <div class="form-check d-flex align-items-center">
                            <input class="form-check-input item-check fs-4 mt-0 me-3 shadow-sm border-secondary-subtle" type="checkbox" value="" id="check-{{ item.id }}" onchange="togglePackButton()">
                            <label class="form-check-label text-dark flex-grow-1" for="check-{{ item.id }}" id="label-{{ item.id }}" style="transition: all 0.2s; cursor: pointer; width: 100%;">
                                <div class="d-flex align-items-center justify-content-between">
                                    <span style="font-size: 1.05rem;">{{ item.product.name }}</span>
                                    <span class="badge bg-light text-dark border fw-bold rounded-pill px-3 py-2 ms-2" style="font-size: 0.95rem;">{{ item.quantity }}x</span>
                                </div>
                            </label>
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>

        <!-- Action Button -->
        <div class="pb-5">
            <form action="{% url 'pack_order' order.id %}" method="POST" class="m-0" onsubmit="sessionStorage.setItem('deliveryActiveTab', '#delivery-tab');">
                {% csrf_token %}
                <button type="submit" id="pack-btn" class="btn w-100 fw-bold text-white rounded-pill py-3 shadow" style="background-color: #ff6600; font-size: 1.1rem; transition: all 0.2s;" disabled>
                    <i class="bi bi-box-seam fs-5 me-2 align-middle"></i> <span class="align-middle">Mark as Packed</span>
                </button>
            </form>
        </div>

    </div>
</div>

<style>
    .last-border-0:last-child {
        border-bottom: none !important;
        padding-bottom: 0 !important;
        margin-bottom: 0 !important;
    }
    .form-check-input:checked {
        background-color: #ff6600;
        border-color: #ff6600;
    }
</style>

<script>
function togglePackButton() {
    const checkboxes = document.querySelectorAll('.item-check');
    const allChecked = Array.from(checkboxes).every(cb => cb.checked);
    const packBtn = document.getElementById('pack-btn');
    
    packBtn.disabled = !allChecked;
    
    checkboxes.forEach(cb => {
        const labelId = cb.id.replace('check-', 'label-');
        const label = document.getElementById(labelId);
        if (cb.checked) {
            label.style.opacity = '0.5';
            label.style.textDecoration = 'line-through';
        } else {
            label.style.opacity = '1';
            label.style.textDecoration = 'none';
        }
    });
}
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}
