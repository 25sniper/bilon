{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Login</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username or Phone Number</label>
                        <input type="text" name="username_or_phone" class="form-control form-control-lg" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert border-0 rounded-3 py-2 px-3 mb-3 d-flex align-items-center gap-2
                                {% if message.tags == 'error' %}alert-danger{% else %}alert-info{% endif %}"
                                style="font-size: 0.9rem;">
                                <i class="bi {% if message.tags == 'error' %}bi-exclamation-circle-fill{% else %}bi-info-circle-fill{% endif %}"></i>
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    <button type="submit" class="btn btn-primary btn-lg w-100" style="background-color: #ff6600; border-color: #ff6600;">Log In</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
